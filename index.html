  label{display:block;font-size:13px;color:var(--muted);margin:0 0 6px;font-weight:600}

      "Modern stack and first-class AI-assisted development.",
      "Small, fast, high-impact team."],
    details_h:"Details", details:["💵 Salary: USD 1,500–2,500 / mo","💼 Type: contracted","🧭 Level: experienced","📍 100% remote","🕐 Full-time"],
    eo:"raaamp is an Equal Opportunities Employer, committed to diversity and inclusion.",
    footer:"© raaamp · AI & Automation for Companies",
    f_title:"Apply for this role", f_sub:"Takes under 2 minutes. We'll reach out on WhatsApp.",
    f_name:"Full name", f_wa:"WhatsApp (with country code)", f_email:"Email",
    f_lang:"Which language should we contact you in?",
    f_cv:"Resume (PDF)", f_cv_ph:"Click to attach your CV",
    f_consent:"I authorize raaamp to contact me on WhatsApp and to process my data.",
    f_send:"Submit application",
    ko:["Do you have experience with automation (n8n, Make, Zapier) or Python?",
        "Can you work full-time and exclusively?"],
    yes:"Yes", no:"No",
    f_english:"English level (CEFR)", english_ph:"Select your level",
    f_salary:"Annual salary expectation (USD)", f_salary_ph:"e.g. 24000",
    english_opts:[["A1","A1 — Beginner"],["A2","A2 — Elementary"],["B1","B1 — Intermediate"],["B2","B2 — Upper-intermediate"],["C1","C1 — Advanced"],["C2","C2 — Proficient / Native"]],
    f_done_h:"Application received!", f_done_p:"Thanks for applying. We'll message you on WhatsApp with next steps.",
    err_ko:"Please answer the required questions.", err_email:"Please enter a valid email.", err_english:"Please select your English level.", err_salary:"Please enter your salary expectation.", err_phone:"Please check your phone number.", err_consent:"We need your consent.", err_cv:"Please attach your resume.",
    err_req:"Please complete the required fields.", sending:"Sending..."
  }
};

let lang = (navigator.language||"es").startsWith("en") ? "en" : "es";
let commLang = lang; // idioma de comunicación elegido por el candidato
const answers = {};

function t(){ return I18N[lang]; }
function render(){
  document.documentElement.lang = lang;
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const v = t()[el.dataset.i18n]; if(typeof v==="string") el.textContent = v;
  });
  document.getElementById("chips").innerHTML = t().chips.map(c=>`<span class="chip">${c}</span>`).join("");
  fillList("role_list", t().role); fillList("req_list", t().req);
  fillList("pref_list", t().pref); fillList("offer_list", t().offer);
  document.getElementById("details").innerHTML = t().details.map(c=>`<span class="chip">${c}</span>`).join("");
  document.getElementById("kobox").innerHTML = t().ko.map((q,i)=>
    `<div class="q"><div class="qt">${q}</div><div class="seg" data-key="k${i}">
      <button type="button" data-v="si">${t().yes}</button>
      <button type="button" data-v="no">${t().no}</button></div></div>`).join("");
  Object.entries(answers).forEach(([k,v])=>{
    const seg=document.querySelector(`.seg[data-key="${k}"]`);
    if(seg){ const b=seg.querySelector(`button[data-v="${v}"]`); if(b) b.classList.add("on"); }
  });
  const eng=document.getElementById("english"); const cur=eng.value;
  eng.innerHTML = `<option value="" disabled ${cur?"":"selected"}>${t().english_ph}</option>` +
    t().english_opts.map(o=>`<option value="${o[0]}" ${cur===o[0]?"selected":""}>${o[1]}</option>`).join("");
  document.getElementById("salary").placeholder = t().f_salary_ph;
  document.getElementById("cvLabel").textContent = cv.files[0] ? "📎 "+cv.files[0].name : t().f_cv_ph;
  document.querySelectorAll("#lang button").forEach(b=>b.classList.toggle("on", b.dataset.l===lang));
  document.querySelectorAll("#langpref button").forEach(b=>b.classList.toggle("on", b.dataset.v===commLang));
}
function fillList(id, arr){ document.getElementById(id).innerHTML = arr.map(x=>`<li><span>${x}</span></li>`).join(""); }

const cv = document.getElementById("cv");
cv.addEventListener("change",()=> document.getElementById("cvLabel").textContent = cv.files[0]?"📎 "+cv.files[0].name:t().f_cv_ph);

document.getElementById("lang").addEventListener("click",e=>{
  const b=e.target.closest("button[data-l]"); if(!b) return; lang=b.dataset.l; render();
});
document.getElementById("kobox").addEventListener("click",e=>{
  const b=e.target.closest("button[data-v]"); if(!b) return;
  const seg=b.parentElement, key=seg.dataset.key;
  seg.querySelectorAll("button").forEach(x=>x.classList.remove("on"));
  b.classList.add("on"); answers[key]=b.dataset.v;
});
document.getElementById("langpref").addEventListener("click",e=>{
  const b=e.target.closest("button[data-v]"); if(!b) return;
  commLang=b.dataset.v;
  document.querySelectorAll("#langpref button").forEach(x=>x.classList.toggle("on",x===b));
});

const overlay=document.getElementById("overlay");
document.querySelectorAll("[data-open]").forEach(b=>b.onclick=()=>overlay.classList.add("open"));
document.querySelectorAll("[data-close]").forEach(b=>b.onclick=()=>overlay.classList.remove("open"));
overlay.addEventListener("click",e=>{ if(e.target===overlay) overlay.classList.remove("open"); });

const params=new URLSearchParams(location.search);
const fuente=params.get("utm_source")||params.get("fuente")||"directo";
const utm={}; for(const[k,v] of params) if(k.startsWith("utm_")) utm[k]=v;

const form=document.getElementById("form"), msg=document.getElementById("msg"), btn=document.getElementById("submit");
form.addEventListener("submit", async e=>{
  e.preventDefault(); msg.className="msg";
  const num=waInput.value.replace(/[^\d]/g,"");
  if(!form.nombre.value.trim()||!num) return showErr(t().err_req);
  const email=form.email.value.trim();
  if(!email||!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) return showErr(t().err_email);
  // Si utils ya cargó y el número es inválido, avisar (no bloquea si aún no cargó).
  if(num && typeof iti.isValidNumber==="function" && iti.isValidNumber()===false && iti.getNumber()){
    return showErr(t().err_phone);
  }
  // Número en formato internacional E.164 (ej. +573001234567)
  const whatsapp = iti.getNumber() || ("+"+iti.getSelectedCountryData().dialCode+num);
  if(Object.keys(answers).length<2) return showErr(t().err_ko);
  const engVal=document.getElementById("english").value;
  if(!engVal) return showErr(t().err_english);
  const salaryVal=Number(document.getElementById("salary").value);
  if(!salaryVal||salaryVal<=0) return showErr(t().err_salary);
  if(!document.getElementById("optin").checked) return showErr(t().err_consent);
  if(!cv.files[0]) return showErr(t().err_cv);
  btn.disabled=true; btn.textContent=t().sending;
  try{
    const ko={experiencia:answers.k0,exclusividad:answers.k1};
    const nivel_ingles=({A1:"basico",A2:"basico",B1:"intermedio",B2:"intermedio",C1:"avanzado",C2:"avanzado"})[engVal];
    const fd=new FormData();
    fd.append("nombre",form.nombre.value.trim());
    fd.append("email",form.email.value.trim());
    fd.append("whatsapp",whatsapp);
    fd.append("whatsapp_optin","true");
    fd.append("fuente",fuente); fd.append("utm",JSON.stringify(utm));
    fd.append("idioma",commLang);
    fd.append("knockout",JSON.stringify(ko));
    fd.append("nivel_ingles",nivel_ingles); fd.append("nivel_ingles_cefr",engVal);
    fd.append("expectativa_salarial",String(salaryVal)); fd.append("salario_periodo","anual"); fd.append("salario_moneda","USD");
    fd.append("cv",cv.files[0]);
    const res=await fetch(`${C.FUNCTIONS_URL}/ingest-lead`,{
      method:"POST", headers:{apikey:C.ANON_KEY,Authorization:`Bearer ${C.ANON_KEY}`}, body:fd });
    const data=await res.json();
    if(!res.ok) throw new Error(data.error||"Error");
    document.getElementById("formView").style.display="none";
    document.getElementById("doneView").style.display="block";
    render();
  }catch(err){ showErr(err.message||"Error"); btn.disabled=false; btn.textContent=t().f_send; }
});
function showErr(x){ msg.className="msg err"; msg.textContent=x; }

render();
</script>
</body>
</html>
