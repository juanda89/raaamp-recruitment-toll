<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI and Automation Specialist · raaamp</title>
<meta name="description" content="Únete a raaamp como AI and Automation Specialist. 100% remoto. Disponible en español e inglés." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F8FAFC; --bg2:#FFFFFF; --panel:#FFFFFF; --panel2:#F5F7FA;
    --line:#E6EBF1; --line2:#EDF1F6; --txt:#0B0B0B; --muted:#5B6675; --muted2:#8A94A3;
    --lime:#98d653; --cyan:#0ea5b9; --grad:linear-gradient(135deg,#c7ff8a 0%,#8affe6 100%);
    --grad2:linear-gradient(90deg,#98d653 0%,#0ea5b9 100%);
    --err:#dc2626; --ink:#06251c;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;font-family:Manrope,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    color:var(--txt);line-height:1.6;
    background:
      radial-gradient(900px 480px at 88% -8%,rgba(138,255,230,.22),transparent),
      radial-gradient(820px 460px at -5% 4%,rgba(199,255,138,.20),transparent),
      var(--bg);}
  h1,h2,h3{font-family:Outfit,sans-serif;line-height:1.13;margin:0}
  a{color:inherit}
  .wrap{max-width:900px;margin:0 auto;padding:0 22px}
  /* nav + language */
  nav{display:flex;align-items:center;gap:14px;max-width:900px;margin:0 auto;padding:20px 22px}
  .brand{display:flex;align-items:center;gap:10px;font-family:Outfit;font-weight:800;font-size:20px;letter-spacing:-.3px}
  .logo{width:14px;height:14px;border-radius:50%;background:var(--grad2)}
  .sp{flex:1}
  .langwrap{display:flex;align-items:center;gap:10px}
  .langhint{font-size:12.5px;color:var(--muted);font-weight:600;display:none}
  @media(min-width:560px){.langhint{display:block}}
  .lang{display:flex;align-items:center;background:var(--bg2);border:1.5px solid var(--line);
    border-radius:999px;overflow:hidden;font-size:14px;box-shadow:0 2px 10px rgba(11,11,11,.05)}
  .lang .globe{padding:0 4px 0 12px;font-size:14px}
  .lang button{background:transparent;border:0;color:var(--muted);padding:9px 16px;cursor:pointer;
    font-family:Outfit;font-weight:700}
  .lang button.on{background:var(--grad);color:var(--ink)}
  /* hero */
  .hero{padding:30px 0 8px}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:#0a7f5e;
    background:rgba(152,214,83,.14);border:1px solid rgba(152,214,83,.4);border-radius:999px;padding:6px 14px;margin-bottom:20px}
  .eyebrow .pdot{width:7px;height:7px;border-radius:50%;background:var(--lime);box-shadow:0 0 10px var(--lime)}
  h1.title{font-size:48px;font-weight:800;letter-spacing:-1.6px;margin-bottom:14px}
  h1.title .g{background:var(--grad2);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .sub{font-size:18.5px;color:var(--muted);max-width:660px;margin-bottom:22px}
  .chips{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:28px}
  .chip{font-size:13px;font-weight:600;color:var(--txt);background:var(--bg2);border:1px solid var(--line);
    border-radius:999px;padding:7px 14px}
  .cta{display:inline-flex;align-items:center;gap:9px;background:var(--grad);color:var(--ink);font-family:Outfit;
    font-weight:800;font-size:16px;border:0;border-radius:12px;padding:15px 30px;cursor:pointer;
    box-shadow:0 10px 26px rgba(14,165,185,.22);transition:transform .15s,box-shadow .15s}
  .cta:hover{transform:translateY(-2px);box-shadow:0 16px 34px rgba(14,165,185,.30)}
  /* sections */
  section.block{padding:26px 0;border-top:1px solid var(--line)}
  .block h2{font-size:25px;font-weight:700;letter-spacing:-.5px;margin-bottom:14px}
  .block p{color:var(--muted);margin:0 0 12px;font-size:15.5px}
  ul.feat{list-style:none;padding:0;margin:0;display:grid;gap:11px}
  ul.feat li{display:flex;gap:12px;align-items:flex-start;color:var(--txt);font-size:15.5px}
  ul.feat li:before{content:"";flex:0 0 auto;width:8px;height:8px;border-radius:50%;background:var(--grad2);margin-top:9px}
  ul.feat li b{font-weight:700}
  .endcta{text-align:center;padding:40px 0 56px}
  footer{border-top:1px solid var(--line);padding:24px 0;color:var(--muted2);font-size:13px;text-align:center}
  /* modal form */
  .overlay{position:fixed;inset:0;background:rgba(11,11,11,.45);backdrop-filter:blur(5px);display:none;z-index:50;
    align-items:flex-start;justify-content:center;overflow-y:auto;padding:5vh 16px}
  .overlay.open{display:flex}
  .modal{background:var(--bg2);border:1px solid var(--line);border-radius:20px;width:520px;max-width:100%;
    padding:28px;box-shadow:0 30px 80px rgba(11,11,11,.22)}
  .modal h3{font-size:23px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px}
  .modal .msub{color:var(--muted);font-size:14px;margin-bottom:20px}
  .x{float:right;background:transparent;border:0;color:var(--muted);font-size:22px;cursor:pointer;line-height:1}
  label{display:block;font-size:13px;color:var(--muted);margin:0 0 6px;font-weight:600}
  .req:after{content:" *";color:var(--cyan)}
  input{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    border-radius:11px;padding:12px 13px;font-size:14.5px;font-family:inherit}
  input:focus{outline:none;border-color:var(--cyan)}
  .field{margin-bottom:16px}
  .file{border:1.5px dashed var(--line);border-radius:11px;padding:16px;text-align:center;cursor:pointer;color:var(--muted);font-size:14px}
  .file:hover{border-color:var(--cyan);color:var(--txt)}
  .q{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:10px}
  .q .qt{font-size:13.5px;margin-bottom:9px}
  .seg{display:flex;gap:7px}
  .seg button{flex:1;background:var(--bg2);border:1px solid var(--line);color:var(--muted);border-radius:9px;
    padding:8px;cursor:pointer;font-size:13px;font-family:inherit;font-weight:700}
  .seg button.on{background:var(--grad);border-color:transparent;color:var(--ink)}
  .consent{display:flex;gap:10px;align-items:flex-start;font-size:12.5px;color:var(--muted);margin:4px 0 18px}
  .consent input{width:auto;margin-top:3px}
  .submit{width:100%;background:var(--grad);color:var(--ink);font-family:Outfit;font-weight:800;font-size:16px;
    border:0;border-radius:12px;padding:15px;cursor:pointer}
  .submit:disabled{opacity:.5;cursor:not-allowed}
  .msg{margin-top:14px;padding:12px;border-radius:10px;font-size:13.5px;display:none}
  .msg.err{display:block;background:rgba(220,38,38,.08);border:1px solid var(--err);color:#b91c1c}
  .done{text-align:center;padding:24px 6px}
  .done .ic{font-size:46px}.done h3{margin:8px 0}
</style>
</head>

  </section>

  </section>

  <section class="block">

  <section class="block">

  <section class="block">

  <section class="block">

  </div>
</main>

<footer><span data-i18n="footer"></span></footer>

<!-- FORM modal -->
<div class="overlay" id="overlay">

      <button class="x" data-close>✕</button>
      <h3 data-i18n="f_title"></h3>

        <div class="msg" id="msg"></div>

    </div>
    <div id="doneView" class="done" style="display:none">

      <h3 data-i18n="f_done_h"></h3>
      <p class="msub" data-i18n="f_done_p"></p>

  </div>
</div>

let lang = (navigator.language||"es").startsWith("en") ? "en" : "es";
const answers = {};

function t(){ return I18N[lang]; }
function render(){
  document.documentElement.lang = lang;
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const v = t()[el.dataset.i18n]; if(typeof v==="string") el.textContent = v;
  });
  document.getElementById("chips").innerHTML = t().chips.map(c=>`<span class="chip">${c}</span>`).join("");
  fillList("role_list", t().role); fillList("req_list", t().req);
  fillList("pref_list", t().pref); fillList("offer_list", t().offer);
  document.getElementById("details").innerHTML = t().details.map(c=>`<span class="chip">${c}</span>`).join("");
  document.getElementById("kobox").innerHTML = t().ko.map((q,i)=>
    `<div class="q"><div class="qt">${q}</div><div class="seg" data-key="k${i}">
      <button type="button" data-v="si">${t().yes}</button>
      <button type="button" data-v="no">${t().no}</button></div></div>`).join("");
  Object.entries(answers).forEach(([k,v])=>{
    const seg=document.querySelector(`.seg[data-key="${k}"]`);
    if(seg){ const b=seg.querySelector(`button[data-v="${v}"]`); if(b) b.classList.add("on"); }
  });
  document.getElementById("cvLabel").textContent = cv.files[0] ? "📎 "+cv.files[0].name : t().f_cv_ph;
  document.querySelectorAll("#lang button").forEach(b=>b.classList.toggle("on", b.dataset.l===lang));
}
function fillList(id, arr){ document.getElementById(id).innerHTML = arr.map(x=>`<li><span>${x}</span></li>`).join(""); }

const cv = document.getElementById("cv");
cv.addEventListener("change",()=> document.getElementById("cvLabel").textContent = cv.files[0]?"📎 "+cv.files[0].name:t().f_cv_ph);

document.getElementById("lang").addEventListener("click",e=>{
  const b=e.target.closest("button[data-l]"); if(!b) return; lang=b.dataset.l; render();
});
document.getElementById("kobox").addEventListener("click",e=>{
  const b=e.target.closest("button[data-v]"); if(!b) return;
  const seg=b.parentElement, key=seg.dataset.key;
  seg.querySelectorAll("button").forEach(x=>x.classList.remove("on"));
  b.classList.add("on"); answers[key]=b.dataset.v;
});

const overlay=document.getElementById("overlay");
document.querySelectorAll("[data-open]").forEach(b=>b.onclick=()=>overlay.classList.add("open"));
document.querySelectorAll("[data-close]").forEach(b=>b.onclick=()=>overlay.classList.remove("open"));
overlay.addEventListener("click",e=>{ if(e.target===overlay) overlay.classList.remove("open"); });

const params=new URLSearchParams(location.search);
const fuente=params.get("utm_source")||params.get("fuente")||"directo";
const utm={}; for(const[k,v] of params) if(k.startsWith("utm_")) utm[k]=v;

const form=document.getElementById("form"), msg=document.getElementById("msg"), btn=document.getElementById("submit");
form.addEventListener("submit", async e=>{
  e.preventDefault(); msg.className="msg";
  if(!form.nombre.value.trim()||!form.whatsapp.value.trim()) return showErr(t().err_req);
  if(Object.keys(answers).length<3) return showErr(t().err_ko);
  if(!document.getElementById("optin").checked) return showErr(t().err_consent);
  if(!cv.files[0]) return showErr(t().err_cv);
  btn.disabled=true; btn.textContent=t().sending;
  try{
    const ko={experiencia:answers.k0,tiempo_completo:answers.k1,ingles:answers.k2};
    const fd=new FormData();
    fd.append("nombre",form.nombre.value.trim());
    fd.append("email",form.email.value.trim());
    fd.append("whatsapp",form.whatsapp.value.trim());
    fd.append("whatsapp_optin","true");
    fd.append("fuente",fuente); fd.append("utm",JSON.stringify(utm));
    fd.append("knockout",JSON.stringify(ko)); fd.append("cv",cv.files[0]);
    const res=await fetch(`${C.FUNCTIONS_URL}/ingest-lead`,{
      method:"POST", headers:{apikey:C.ANON_KEY,Authorization:`Bearer ${C.ANON_KEY}`}, body:fd });
    const data=await res.json();
    if(!res.ok) throw new Error(data.error||"Error");
    document.getElementById("formView").style.display="none";
    document.getElementById("doneView").style.display="block";
    render();
  }catch(err){ showErr(err.message||"Error"); btn.disabled=false; btn.textContent=t().f_send; }
});
function showErr(x){ msg.className="msg err"; msg.textContent=x; }

render();
</script>
</body>
</html>
